name: Scrape tides

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run scrape:all

      - name: Commit data updates
        run: |
          git config user.name  "tide-bot"
          git config user.email "tide-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: nightly tide refresh"
            git push
          fi
